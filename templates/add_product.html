{% extends "base.html" %}
{% block page_title %}Add Product{% endblock %}
{% block content %}
<div class="card" style="max-width:720px; margin:0 auto;">
  <div class="card-title">➕ Add New Product</div>
  <form method="POST">
    <div class="form-grid">
      <div class="form-group">
        <label>Product Name *</label>
        <input type="text" name="name" placeholder="e.g. Basmati Rice" required>
      </div>
      <div class="form-group">
        <label>Category *</label>
        <select name="category" required>
          {% for cat in categories %}
            <option value="{{ cat }}">{{ cat }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Quantity *</label>
        <input type="number" name="quantity" placeholder="0" min="0" step="0.01" required>
      </div>
      <div class="form-group">
        <label>Unit *</label>
        <select name="unit" required>
          {% for u in units %}
            <option value="{{ u }}">{{ u }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Price per Unit (₹) *</label>
        <input type="number" name="price" placeholder="0.00" min="0" step="0.01" required>
      </div>
      <div class="form-group">
        <label>Minimum Stock Level *</label>
        <input type="number" name="min_stock" placeholder="10" min="0" step="0.01" required>
      </div>
      <div class="form-group">
        <label>Expiry Date *</label>
        <input type="date" name="expiry" required>
      </div>
      <div class="form-group">
        <label>Supplier *</label>
        <input type="text" name="supplier" placeholder="e.g. FreshFarm Co." required>
      </div>
    </div>
    <div style="margin-top:24px; display:flex; gap:12px;">
      <button type="submit" class="btn btn-primary">✅ Add Product</button>
      <a href="{{ url_for('products') }}" class="btn" style="background:#f5f5f5; color:#555">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
